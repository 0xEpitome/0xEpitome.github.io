baseURL = "0xEpitome.github.io/"
title = "0xEpitome"

theme = "puppet"
#themesDir = "../.."

copyright = ""
paginate = 3
languageCode = "en"
defaultContentLanguage = "en"

hasCJKLanguage = true
enableInlineShortcodes = true
enableEmoji = true
# prevent build failures when using Hugo's Instagram shortcode due to deprecated Instagram API.
# See https://github.com/gohugoio/hugo/issues/7228#issuecomment-714490456
ignoreErrors = ["error-remote-getjson"]

disqusShortname = ""
googleAnalytics = ""

[outputs]
home = ["HTML", "JSON", "RSS"]

# prevent build failures when using Hugo's template _internal/opengraph.html 
[taxonomies]
category = "categories"
author = "authors"
tag = "tags"
series = "series"

[markup]
[markup.highlight]
noClasses = true
codeFences = true
guessSyntax = true
lineNos = true
lineNumbersInTable = false
style = "dracula"

[markup.goldmark.renderer]
unsafe = true

[menu]
[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = -100
[[menu.main]]
identifier = "Blog"
name = "Blog"
url = "/Blog"
weight = 20
[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 50
[[menu.main]]
identifier = "archive"
name = "Archive"
url = "/archive/"
weight = 10


[params]
author = "0xEpitome"
description = "CTF Player | Malware Analysis | Security Analyst"

keywords = "blog,hacker,pentest, Malware"
img_home = "img/profile.jpg"
img_404 = "img/404-bg.jpg"

useFaviconGenerator = false

custom_js = []
custom_css = [] # ["css/custom.css"]  Add your file to assets folder  [assets/css/custom.css]

[params.sidebar]
enable = true
gravatarEmail = ""
# Overwritten by your gravatar image if `gravatarEmail` is filled
avatar = "img/profile.jpg"
bio = "A Typical Hacker's Blog"

[params.social]
twitter = "0xEpitome"
github = "0xEpitome"
#linkedin = "moses-kariuki-irungu"
email = "0xepitome@gmail.com"
rss = true
medium = "@0x3pitom3"



